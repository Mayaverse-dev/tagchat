<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TagChat</title>
    <script>
      (function() {
        var p = navigator.platform || navigator.userAgent || '';
        var os = /Mac/.test(p) ? 'macos' : /Win/.test(p) ? 'windows' : /Linux/.test(p) ? 'linux' : 'unknown';
        document.documentElement.dataset.platform = os;
        var t = localStorage.getItem('tc-theme-id');
        if (t === 'system' || !t) {
          document.documentElement.classList.toggle('dark', window.matchMedia('(prefers-color-scheme: dark)').matches);
        } else {
          var dark = localStorage.getItem('tc-theme-dark');
          document.documentElement.classList.toggle('dark', dark === 'true');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
