<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TagChat — Download</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0b0d14;
      color: #e4e4ef;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      max-width: 480px;
      width: 100%;
      padding: 48px 32px;
      text-align: center;
    }
    .logo {
      width: 64px; height: 64px;
      border-radius: 16px;
      background: linear-gradient(135deg, #7c5cff, #8b5cf6);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; font-weight: 700; color: white;
      margin: 0 auto 24px;
    }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    .subtitle { color: #94a3b8; font-size: 14px; margin-bottom: 32px; }
    .auth-form { display: flex; flex-direction: column; gap: 12px; margin-bottom: 32px; }
    input[type="password"] {
      background: #161830;
      border: 1px solid #2a2a3d;
      color: #e4e4ef;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      text-align: center;
      letter-spacing: 2px;
    }
    input:focus { border-color: #7c5cff; }
    .btn {
      background: #7c5cff;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn:hover { background: #9178ff; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .error { color: #ef4444; font-size: 13px; margin-top: -4px; }
    .downloads { display: none; }
    .downloads.visible { display: block; }
    .download-grid { display: flex; gap: 16px; margin-top: 24px; }
    .download-card {
      flex: 1;
      background: #161830;
      border: 1px solid #2a2a3d;
      border-radius: 12px;
      padding: 24px 16px;
      text-align: center;
      transition: all 0.2s;
      text-decoration: none;
      color: inherit;
    }
    .download-card:hover { border-color: #7c5cff; background: #1a1c35; }
    .platform-icon { font-size: 36px; margin-bottom: 12px; display: block; }
    .platform-name { font-weight: 600; font-size: 15px; display: block; margin-bottom: 4px; }
    .platform-detail { font-size: 12px; color: #94a3b8; }
    .version-info { color: #94a3b8; font-size: 12px; margin-top: 16px; }
    .footer { margin-top: 48px; font-size: 11px; color: #6b6b82; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">M</div>
    <h1>TagChat</h1>
    <p class="subtitle">MAYA: Seed Takes Root — Publishing Hub<br>Authors Equity × Dept of Lore</p>

    <div class="auth-form" id="authForm">
      <input type="password" id="password" placeholder="Enter access code" autocomplete="off">
      <button class="btn" id="authBtn" onclick="authenticate()">Access Downloads</button>
      <div class="error" id="error" style="display:none"></div>
    </div>

    <div class="downloads" id="downloads">
      <p style="font-size: 14px; color: #94a3b8; margin-bottom: 8px;">Choose your platform:</p>
      <div class="download-grid">
        <a class="download-card" id="macLink" href="#">
          <span class="platform-icon"></span>
          <span class="platform-name">macOS</span>
          <span class="platform-detail">Apple Silicon & Intel<br>.dmg installer</span>
        </a>
        <a class="download-card" id="winLink" href="#">
          <span class="platform-icon">🪟</span>
          <span class="platform-name">Windows</span>
          <span class="platform-detail">Windows 10+<br>.exe installer</span>
        </a>
      </div>
      <div class="version-info" id="versionInfo"></div>
    </div>

    <div class="footer">Dept of Lore — Proprietary Software</div>
  </div>

  <script>
    let authToken = localStorage.getItem('tagchat_token')
    if (authToken) showDownloads()

    async function authenticate() {
      const pass = document.getElementById('password').value
      const errEl = document.getElementById('error')
      errEl.style.display = 'none'

      try {
        const res = await fetch('/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pass })
        })
        if (!res.ok) {
          errEl.textContent = 'Incorrect access code'
          errEl.style.display = 'block'
          return
        }
        const data = await res.json()
        authToken = data.token
        localStorage.setItem('tagchat_token', authToken)
        showDownloads()
      } catch (e) {
        errEl.textContent = 'Connection error'
        errEl.style.display = 'block'
      }
    }

    function showDownloads() {
      document.getElementById('authForm').style.display = 'none'
      document.getElementById('downloads').classList.add('visible')
      document.getElementById('macLink').href = '/download/mac?token=' + authToken
      document.getElementById('winLink').href = '/download/windows?token=' + authToken

      fetch('/api/version').then(r => r.json()).then(d => {
        if (d.version !== '0.0.0') {
          document.getElementById('versionInfo').textContent = 'Latest: v' + d.version
        }
      }).catch(() => {})
    }

    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') authenticate()
    })
  </script>
</body>
</html>
